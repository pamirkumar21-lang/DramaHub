workflows:
  android-debug:
    name: Android Debug
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - android_sdk
    scripts:
      - name: Initialize Gradle Wrapper
        script: |
          cd app
          gradle wrapper
      - name: Build Android APK
        script: |
          cd app
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
      
